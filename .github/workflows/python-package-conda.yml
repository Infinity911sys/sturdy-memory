name: Build Conda Package

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.10"
        activate-environment: build-env
        environment-file: environment.yml
        use-mamba: true

    - name: Show conda info
      run: conda info

    - name: Update base tools
      run: |
        mamba install -y pip setuptools wheel

    - name: Install pip dependencies (with full logs)
      run: |
        set -o pipefail
        if [ -f condaenv.*.requirements.txt ]; then
          REQ=$(ls condaenv.*.requirements.txt)
          echo "Using auto-generated pip requirements: $REQ"
          pip install -U -r "$REQ" --verbose
        else
          echo "No auto-generated pip requirements found"
        fi

    - name: Install local package
      run: |
        pip install -e .

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 .

    - name: Test with pytest
      run: |
        pip install pytest
        pytest -vv


name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
    - name: Lint with flake8
      run: |
        conda install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        conda install pytest
        pytest
